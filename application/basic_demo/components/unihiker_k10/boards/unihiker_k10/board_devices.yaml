board: unihiker_k10
chip: esp32s3
version: '1.0.0'

devices:
  - name: display_lcd
    chip: ili9341
    type: display_lcd
    version: default
    sub_type: spi
    dependencies:
      espressif/esp_lcd_ili9341: "*"
      espressif/esp_io_expander_tca95xx_16bit: "*"
    config:
      mirror_x: false
      mirror_y: true
      swap_xy: false
      x_max: 240
      y_max: 320
      invert_color: false
      need_reset: false
      io_spi_config:
        cs_gpio_num: 14
        dc_gpio_num: 13
        spi_mode: 0
        pclk_hz: 40000000
        trans_queue_depth: 10
        lcd_cmd_bits: 8
        lcd_param_bits: 8
      lcd_panel_config:
        reset_gpio_num: -1
        rgb_ele_order: LCD_RGB_ELEMENT_ORDER_BGR
        data_endian: LCD_RGB_DATA_ENDIAN_BIG
        bits_per_pixel: 16
    peripherals:
      - name: spi_display

  - name: audio_dac
    type: custom
    version: default
    dependencies:
      espressif/esp_codec_dev: "*"
    config:
      sample_rate_hz: 24000
    peripherals:
      - name: i2s_audio_out

  - name: audio_adc
    chip: es7243e
    type: audio_codec
    version: default
    config:
      adc_enabled: true
      adc_max_channel: 2
      adc_channel_mask: "11"
      adc_channel_labels: ["RE", "FL"]
      adc_init_gain: 30
      dac_enabled: false
    peripherals:
      - name: i2s_audio_in
      - name: i2c_master
        address: 0x23
        frequency: 400000

  - name: camera
    chip: gc2145
    type: camera
    version: default
    sub_type: dvp
    init_skip: true
    config:
      dvp_config:
        reset_io: -1
        pwdn_io: -1
        vsync_io: 4
        data_width: CAM_CTLR_DATA_WIDTH_8
        de_io: 5
        pclk_io: 17
        xclk_io: 7
        xclk_freq: 6000000
        data_io:
          data_io_0: 8
          data_io_1: 10
          data_io_2: 11
          data_io_3: 9
          data_io_4: 18
          data_io_5: 16
          data_io_6: 15
          data_io_7: 6
    peripherals:
      - name: i2c_master
        frequency: 100000
